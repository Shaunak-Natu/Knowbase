# KnowBase nginx reverse proxy config
# Place SSL certs in ./nginx/ssl/ and update the server_name below

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── No upload size limit (matches app behaviour) ─────────────────────────
    client_max_body_size 0;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Upstream: KnowBase Node server ───────────────────────────────────────
    upstream knowbase_app {
        server app:3001;
        keepalive 32;
    }

    # ── HTTP → redirect to HTTPS (uncomment when SSL is configured) ──────────
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl http2;          # uncomment for HTTPS
        server_name localhost;           # replace with your domain

        # SSL (uncomment and set cert paths when ready)
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── Static file uploads — served directly by nginx ────────────────
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # Prevent script execution on uploaded files
            add_header Content-Disposition "attachment";
        }

        # ── API — proxy to Node ───────────────────────────────────────────
        location /api/ {
            proxy_pass         http://knowbase_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Long timeouts for large file uploads
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 60s;

            # Disable buffering for streaming/large uploads
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # ── React SPA — everything else goes to index.html ────────────────
        location / {
            proxy_pass         http://knowbase_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                proxy_pass http://knowbase_app;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
